name: Auto-generate Kotlin Class Diagram

on:
  push:
    branches:
      - main  # Сработает при push в ветку main (замените на master, если нужно)
    paths:
      - 'src/main/kotlin2/**/*.kt'  # [ИЗМЕНЕНО] Следим только за файлами в новой папке

jobs:
  generate-diagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Разрешаем запись картинок обратно в репозиторий

    steps:
      # 1. Скачиваем ваш код
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Скачиваем утилиту-парсер Kotlin
      - name: Download Kotlin-to-PlantUML Parser
        run: |
          mkdir -p tools
          curl -L -o tools/k2p.jar https://github.com

      # 4. Скачиваем сам движок PlantUML
      - name: Download PlantUML Jar
        run: |
          curl -L -o tools/plantuml.jar https://github.com

      # 5. Сканируем файл Sea.kt и создаем текстовую схему
      - name: Parse Kotlin Source to PlantUML
        run: |
          mkdir -p diagrams/images
          
          # [ИЗМЕНЕНО] Указали точный путь к вашей папке kotlin2
          java -jar tools/k2p.jar -p ./src/main/kotlin2 -o ./diagrams/class_diagram.puml
          
          # Делаем белый фон, чтобы схему было видно в темной теме GitHub
          sed -i '2i skinparam backgroundColor #FFFFFF' ./diagrams/class_diagram.puml

      # 6. Превращаем текстовую схему в векторную SVG картинку
      - name: Render SVG Diagram
        run: |
          java -jar tools/plantuml.jar -tsvg -o ./images ./diagrams/class_diagram.puml

      # 7. Робот делает коммит и загружает картинку в репозиторий
      - name: Commit and Push Diagram
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          
          git add diagrams/class_diagram.puml diagrams/images/class_diagram.svg
          
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: auto-generate Kotlin class diagram [skip ci]"
            git push
          else
            echo "Изменений в структуре классов не найдено. Пропускаем коммит."
          fi
